<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--<link rel="stylesheet" href="../CSS/position.css">-->
    <title>Forms</title>
</head>
<body>
    <div class="data" id="application">
        <div id="title">
        <header>
            <h1>forms</h1>
        </header>
        </div>
        <main>
            <form >
                <label >Name:</label>
                <input type="text" id="name" placeholder="RamKumar"><br><br>
                <label >Email:</label>
                <input type="email" id="email" placeholder="3200584@dse"><br><br>
                <label >Password:</label>
                <input type="password" id="password" placeholder="12345"><br><br>
                <label >Phone Number:</label>
                <input type="number" id="no" placeholder="1234569876"><br><br>
                <label>Gender:</label>
                <input type="radio" name="Gender" id="1" value="Male">Male
                <input type="radio" name="Gender" id="2" value="FeMale">FeMale
                <input type="radio" name="Gender" id="3" value="Prefer not to say">Prefer not to say
                <br><br>
                <label>Qualification:</label>
                <input class="Qualification" type="checkbox" value="10th">10 <sup>th</sup>
                <input class="Qualification" type="checkbox" value="12th">12 <sup>th</sup>
                <input type="checkbox" class="Qualification" value="Diploma">Diploma
                <input type="checkbox" class="Qualification" value="Bachelors">Bachelors
                <input type="checkbox" value="Masters" class="Qualification">Masters
                <input type="checkbox" value="Doctrate" class="Qualification">Doctrate
                <br><br>
                <label>D.O.B:</label>
                <input type="datetime-local" id="date">
                <br><br>
                <label>color:</label>
                <input type="color">
                <br><br>
                <label for="">Image</label>
                <input type="file" id="im">
                <br><br>
            </form>
        </main>
        <footer>
                <button type="button" onclick="show()">Submit</button>
        </footer>
    </div>
    <div id="result">

    </div>
    <script src="../js/script.js"></script>
</body>
</html>
